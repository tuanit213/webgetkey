<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - Web Get Key</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body data-page="login">
    <main class="center-shell">
      <section class="panel login-panel">
        <p class="eyebrow">Web Get Key</p>
        <h1>Đăng nhập</h1>
        <p class="muted">Đăng nhập bằng tài khoản đã được tạo trong hệ thống.</p>

        <form id="loginForm" class="stack-form">
          <label>
            Tài khoản
            <input id="username" name="username" type="text" autocomplete="username" required />
          </label>
          <label>
            Mật khẩu
            <input id="password" name="password" type="password" autocomplete="current-password" required />
          </label>
          <p id="loginMessage" class="message" aria-live="polite"></p>
          <button class="button primary" type="submit">Đăng nhập</button>
        </form>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
